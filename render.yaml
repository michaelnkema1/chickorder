services:

  # Backend API
  - type: web
    name: chickorder-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        # Set this manually in the Render dashboard to your Supabase Session Pooler URL.
        # Use the Session Pooler (port 5432) — NOT the direct connection — because Render
        # outbound IPs may not reach Supabase's IPv6-only direct connection host.
        # Find it at: Supabase → Project Settings → Database → Connection Pooling → Session Mode
        # Format: postgresql://postgres.[project-ref]:[password]@aws-X-xx-xxxx-X.pooler.supabase.com:5432/postgres
        sync: false
      - key: FRONTEND_URL
        value: https://chickorder-frontend.onrender.com
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: ADMIN_EMAIL
        value: admin@chickorder.com
      - key: ADMIN_PASSWORD
        value: admin123
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: False
    healthCheckPath: /health

  # Frontend
  - type: web
    name: chickorder-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
